{% extends 'base.html' %}

{% block title %}Reset Password - NGO Fund Tracker{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card mt-5">
            <div class="card-header text-center">
                <h3><i class="fas fa-lock me-2"></i>Reset Password</h3>
            </div>
            <div class="card-body p-4">
                <p class="text-center text-muted mb-4">Enter your new password below.</p>

                <form method="POST">
                    <div class="mb-3">
                        <label for="password" class="form-label"><i class="fas fa-lock me-2"></i>New Password</label>
                        <input type="password" class="form-control" id="password" name="password" required
                            minlength="6">
                    </div>

                    <div class="mb-4">
                        <label for="confirm_password" class="form-label"><i class="fas fa-lock me-2"></i>Confirm
                            Password</label>
                        <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                            required minlength="6">
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-2"></i>Reset Password
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
