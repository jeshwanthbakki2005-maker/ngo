{% extends 'base.html' %}

{% block title %}Forgot Password - NGO Fund Tracker{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card mt-5">
            <div class="card-header text-center">
                <h3><i class="fas fa-key me-2"></i>Forgot Password</h3>
            </div>
            <div class="card-body p-4">
                <p class="text-center text-muted mb-4">Enter your email address to request a password reset.</p>
                
                <form method="POST" action="{{ url_for('forgot_password') }}">
                    <div class="mb-3">
                        <label for="user_type" class="form-label"><i class="fas fa-users me-2"></i>User Type</label>
                        <select class="form-select" id="user_type" name="user_type" required>
                            <option value="" selected disabled>Select User Type</option>
                            <option value="beneficiary">Beneficiary</option>
                            <option value="nfsa">NFSA (Admin)</option>
                        </select>
                    </div>
                    
                    <div class="mb-4">
                        <label for="email" class="form-label"><i class="fas fa-envelope me-2"></i>Email Address</label>
                        <input type="email" class="form-control" id="email" name="email" required placeholder="Enter your registered email">
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-paper-plane me-2"></i>Send Request
                        </button>
                    </div>
                </form>
                
                <div class="text-center mt-3">
                    <a href="{{ url_for('home') }}" class="text-decoration-none" style="color: var(--pink-deep);">
                        <i class="fas fa-arrow-left me-1"></i>Back to Home
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
