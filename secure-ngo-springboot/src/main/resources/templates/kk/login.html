<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base :: layout(~{::title}, ~{::content})}">

<head><title th:fragment="title">KK Login - NGO Fund Tracker</title></head>

<body><div th:fragment="content">
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card">
            <div class="card-header text-center py-5">
                <i class="fas fa-user-shield fa-3x mb-3 floating-icon"></i>
                <h3 class="mb-0">KK Login</h3>
                <p class="mb-0 opacity-75">Access your KK support dashboard</p>
            </div>
            <div class="card-body p-4">
                <div th:if="${success}" class="alert alert-success">[[${success}]]</div>
                <div th:if="${error != false}" class="alert alert-danger">[[${error}]]</div>
                <form method="POST" th:action="@{/kk/login}">
                    <div class="mb-3">
                        <label class="form-label"><i class="fas fa-envelope me-2" style="color: #DB7093;"></i>Email Address</label>
                        <input type="email" class="form-control" name="email" required placeholder="kk@example.com">
                    </div>
                    <div class="mb-4">
                        <label class="form-label"><i class="fas fa-lock me-2" style="color: #DB7093;"></i>Password</label>
                        <input type="password" class="form-control" name="password" required placeholder="Enter your password">
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fas fa-sign-in-alt me-2"></i>Login to KK
                        </button>
                    </div>
                </form>
                <div class="text-center mt-4">
                    <p class="mb-0">Don't have an account?
                        <a th:href="@{/kk/signup}" style="color: #C71585; font-weight: 600;">
                            <i class="fas fa-user-plus me-1"></i>Register here
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
</div></body>
</html>
