<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content, activePage)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${title}">NGO Fund Tracker - Donor Dashboard</title>
    <meta name="description" content="NGO Fund Tracker Donor Dashboard - manage donations, view beneficiaries, and track fund distribution.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{--sidebar-bg:#fff;--sidebar-width:220px;--accent:#4F46E5;--accent-light:#EEF2FF;--text-primary:#1e293b;--text-secondary:#64748b;--border:#e2e8f0;--bg:#f8fafc;--white:#fff;--green:#10b981;--card-shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);--card-shadow-hover:0 10px 25px rgba(0,0,0,.08)}
        html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text-primary);overflow:hidden}
        .dash-wrapper{display:flex;height:100vh;overflow:hidden}
        /* SIDEBAR */
        .sidebar{width:var(--sidebar-width);background:var(--sidebar-bg);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
        .sidebar-logo{display:flex;align-items:center;gap:10px;padding:22px 18px 18px;border-bottom:1px solid var(--border)}
        .logo-icon{width:38px;height:38px;background:linear-gradient(135deg,#10b981 40%,#059669);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1rem}
        .logo-text strong{display:block;font-size:.9rem;font-weight:800;color:var(--text-primary)}
        .logo-text span{font-size:.72rem;color:var(--text-secondary)}
        .sidebar-nav{padding:14px 10px;flex:1}
        .nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;color:var(--text-secondary);font-size:.85rem;font-weight:500;cursor:pointer;text-decoration:none;transition:background .18s,color .18s;margin-bottom:2px}
        .nav-item i{width:18px;font-size:.9rem;text-align:center}
        .nav-item:hover{background:var(--accent-light);color:var(--accent)}
        .nav-item.active{background:var(--accent);color:#fff;font-weight:600}
        .nav-item.active i{color:#fff}
        .sidebar-promo{margin:12px;background:linear-gradient(135deg,#1e293b,#334155);border-radius:14px;padding:18px 14px;color:#fff;text-align:center}
        .sidebar-promo .promo-icon{font-size:2.2rem;margin-bottom:8px;color:#fcd34d;}
        .sidebar-promo p{font-size:.78rem;opacity:.85;line-height:1.5}
        .sidebar-footer{padding:12px;border-top:1px solid var(--border)}
        /* MAIN */
        .main-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
        /* TOPBAR */
        .topbar{background:var(--white);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:14px;flex-shrink:0}
        .search-box{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:8px 14px;flex:1;max-width:320px}
        .search-box input{border:none;background:transparent;outline:none;font-size:.85rem;color:var(--text-primary);width:100%}
        .search-box i,.search-hint{color:var(--text-secondary);font-size:.85rem}
        .search-hint{font-size:.75rem}
        .topbar-right{margin-left:auto;display:flex;align-items:center;gap:16px}
        .icon-btn{position:relative;width:36px;height:36px;border-radius:9px;border:1px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-secondary);font-size:.9rem;transition:background .18s}
        .icon-btn:hover{background:var(--bg)}
        .badge-dot{position:absolute;top:-4px;right:-4px;background:#ef4444;color:#fff;font-size:.6rem;font-weight:700;border-radius:99px;min-width:16px;height:16px;display:flex;align-items:center;justify-content:center;padding:0 3px}
        .kk-notice-wrap{position:relative}.kk-notice-box{display:none;position:absolute;right:0;top:44px;width:340px;background:#fff;border:1px solid #e2e8f0;border-radius:12px;box-shadow:0 18px 42px rgba(15,23,42,.2);z-index:500;padding:10px}.kk-notice-box.open{display:block}.kk-notice-head{display:flex;justify-content:space-between;padding:7px 8px 10px;font-size:.8rem;font-weight:800}.kk-notice-item{display:flex;gap:9px;padding:9px 8px;border-top:1px solid #f1f5f9;color:#1e293b;text-decoration:none}.kk-notice-item:hover{background:#f8fafc}.kk-notice-item i{color:#7c3aed;margin-top:3px}.kk-notice-item strong{display:block;font-size:.72rem}.kk-notice-item small{display:block;font-size:.64rem;color:#64748b;line-height:1.4;margin-top:2px}.kk-notice-empty{text-align:center;padding:20px;color:#94a3b8;font-size:.72rem}
        .user-pill{display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 10px 4px 4px;border-radius:99px;border:1px solid var(--border)}
        .user-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#8b5cf6,#6d28d9);display:flex;align-items:center;justify-content:center;color:#fff;font-size:.75rem;font-weight:700}
        .user-pill span{font-size:.82rem;font-weight:600}
        .user-pill i{font-size:.75rem;color:var(--text-secondary)}
        /* CONTENT */
        .content-scroll{flex:1;overflow-y:auto;padding:22px 24px;display:flex;flex-direction:column;gap:20px}
        /* STAT CARDS */
        .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
        .stat-card{background:var(--white);border-radius:12px;padding:12px 14px;box-shadow:var(--card-shadow);display:flex;flex-direction:column;gap:6px;transition:box-shadow .22s}
        .stat-card:hover{box-shadow:var(--card-shadow-hover)}
        .stat-top{display:flex;align-items:flex-start;justify-content:space-between}
        .stat-icon-wrap{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0}
        .stat-label{font-size:.72rem;color:var(--text-secondary);font-weight:500;margin-bottom:2px}
        .stat-value{font-size:1.25rem;font-weight:800;color:var(--text-primary);line-height:1}
        .stat-trend{display:flex;align-items:center;gap:3px;font-size:.7rem;font-weight:600}
        .stat-trend.up{color:#10b981}
        .stat-trend.active{color:#10b981}
        .sparkline-wrap{height:38px;width:100%;flex-shrink:0}
        .sparkline-wrap svg{display:block;width:100%;height:38px;overflow:visible}
        /* MID ROW */
        .mid-row{display:grid;grid-template-columns:1.6fr 1fr 1fr;gap:16px}
        /* CARD */
        .card{background:var(--white);border-radius:14px;box-shadow:var(--card-shadow);overflow:hidden}
        .card-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px}
        .card-head h3{font-size:.92rem;font-weight:700;color:var(--text-primary)}
        .card-head a,.card-head .view-all{font-size:.78rem;color:var(--accent);font-weight:600;text-decoration:none;cursor:pointer}
        .card-body{padding:0 20px 16px}
        .chart-wrap{padding:0 16px 16px;height:200px}
        .year-select{display:flex;align-items:center;gap:6px;font-size:.78rem;color:var(--text-secondary);border:1px solid var(--border);border-radius:8px;padding:4px 10px;cursor:pointer}
        /* DONATION LIST */
        .donation-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
        .donation-item:last-of-type{border-bottom:none}
        .d-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.75rem;font-weight:700;flex-shrink:0}
        .d-info{flex:1}
        .d-name{font-size:.83rem;font-weight:600}
        .d-time{font-size:.72rem;color:var(--text-secondary)}
        .d-amount{font-size:.88rem;font-weight:700;color:var(--text-primary)}
        .more-btn{display:flex;align-items:center;gap:5px;font-size:.78rem;font-weight:600;color:var(--accent);cursor:pointer;text-decoration:none;margin-top:10px}
        /* BENE */
        .bene-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
        .bene-item:last-of-type{border-bottom:none}
        .bene-cat-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.78rem;flex-shrink:0}
        .bene-info{flex:1}
        .bene-name{font-size:.82rem;font-weight:600}
        .bene-cat,.bene-time{font-size:.7rem;color:var(--text-secondary)}
        /* BOTTOM ROW */
        .bottom-row{display:grid;grid-template-columns:1.1fr 1fr 1.1fr;gap:16px}
        /* TABLE */
        .donors-table{width:100%;border-collapse:collapse;font-size:.82rem}
        .donors-table thead th{text-align:left;color:var(--text-secondary);font-size:.74rem;font-weight:600;padding:0 0 10px;border-bottom:1px solid var(--border)}
        .donors-table tbody td{padding:10px 0;border-bottom:1px solid var(--border);vertical-align:middle}
        .donors-table tbody tr:last-child td{border-bottom:none}
        .rank-badge{width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700}
        .td-name-wrap{display:flex;align-items:center;gap:8px}
        /* DONUT */
        .donut-wrap{display:flex;align-items:center;justify-content:center;padding:10px 20px 0;position:relative;height:180px}
        .donut-center{position:absolute;text-align:center;pointer-events:none}
        .donut-center .dc-val{font-size:1rem;font-weight:800}
        .donut-center .dc-lbl{font-size:.68rem;color:var(--text-secondary)}
        .legend-list{padding:12px 20px 16px;display:flex;flex-direction:column;gap:8px}
        .legend-item{display:flex;align-items:center;gap:8px;font-size:.78rem}
        .legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
        .legend-label{flex:1;color:var(--text-secondary)}
        .legend-val{font-weight:600}
        .legend-pct{color:var(--text-secondary)}
        /* ACTIVITIES */
        .activity-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
        .activity-item:last-of-type{border-bottom:none}
        .act-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.78rem;flex-shrink:0}
        .act-info{flex:1}
        .act-text{font-size:.8rem;font-weight:500;line-height:1.4}
        .act-time{font-size:.7rem;color:var(--text-secondary);margin-top:2px}
        /* PLACEHOLDER PAGE SPECIFIC */
        .page-header{margin-bottom:20px}
        .page-header h2{font-size:1.4rem;font-weight:700;color:var(--text-primary)}
        .page-header p{font-size:.85rem;color:var(--text-secondary);margin-top:4px}
        .empty-state{background:var(--white);border-radius:14px;box-shadow:var(--card-shadow);padding:40px;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px}
        .empty-icon{width:64px;height:64px;border-radius:16px;background:var(--accent-light);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin-bottom:16px}
        .empty-state h3{font-size:1.1rem;font-weight:700;margin-bottom:8px;color:var(--text-primary)}
        .empty-state p{font-size:.85rem;color:var(--text-secondary);max-width:400px;margin:0 auto;line-height:1.5}
        /* SCROLLBAR */
        ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:99px}
        /* RESPONSIVE */
        @media(max-width:1100px){.stats-grid{grid-template-columns:repeat(2,1fr)}.mid-row{grid-template-columns:1fr 1fr}.bottom-row{grid-template-columns:1fr}}
        .menu-toggle { display: none; cursor: pointer; font-size: 1.2rem; color: var(--text-primary); margin-right: 14px; }
        @media(max-width:768px){
            .menu-toggle { display: block; }
            .sidebar { position: fixed; left: -100%; top: 0; bottom: 0; z-index: 1000; transition: left 0.3s; display: flex !important; box-shadow: 0 0 20px rgba(0,0,0,0.15); }
            .sidebar.show { left: 0; }
            .stats-grid{grid-template-columns:1fr 1fr}.mid-row{grid-template-columns:1fr}
        }
    </style>
</head>
<body>
<div class="dash-wrapper">
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="logo-icon"><i class="fas fa-hands-holding-heart"></i></div>
            <div class="logo-text">
                <strong>NGO</strong>
                <span>Fund Tracker</span>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a class="nav-item" th:classappend="${activePage == 'dashboard' ? 'active' : ''}" th:href="@{/kk/donor}"><i class="fas fa-th-large"></i> Dashboard</a>
            <a class="nav-item" th:classappend="${activePage == 'donate' ? 'active' : ''}" th:href="@{/kk/donate}"><i class="fas fa-hand-holding-usd"></i> Donate Funds</a>
            <a class="nav-item" th:classappend="${activePage == 'history' ? 'active' : ''}" th:href="@{/kk/history}"><i class="fas fa-history"></i> Donation History</a>
            <a class="nav-item" th:classappend="${activePage == 'beneficiaries' ? 'active' : ''}" th:href="@{/kk/beneficiaries}"><i class="fas fa-users"></i> Beneficiaries</a>
            <a class="nav-item" th:classappend="${activePage == 'reports' ? 'active' : ''}" th:href="@{/kk/reports}"><i class="fas fa-chart-bar"></i> Impact Reports</a>
            <a class="nav-item" th:classappend="${activePage == 'campaigns' ? 'active' : ''}" th:href="@{/kk/campaigns}"><i class="fas fa-bullhorn"></i> Campaigns</a>
            <a class="nav-item" th:classappend="${activePage == 'notifications' ? 'active' : ''}" th:href="@{/kk/notifications}"><i class="fas fa-bell"></i> Notifications <span th:if="${headerNotificationCount != null and headerNotificationCount > 0}" th:text="${headerNotificationCount}" style="margin-left:auto;background:#ef4444;color:#fff;border-radius:99px;font-size:.65rem;padding:1px 6px;font-weight:700;">0</span></a>
            <a class="nav-item" th:classappend="${activePage == 'settings' ? 'active' : ''}" th:href="@{/kk/settings}"><i class="fas fa-cog"></i> Settings</a>
        </nav>
        <div class="sidebar-promo">
            <div class="promo-icon"><i class="fas fa-hand-holding-heart"></i></div>
            <p>Together, we can<br>create a better world!</p>
        </div>
        <div class="sidebar-footer">
            <a class="nav-item" th:href="@{/logout}" style="color:#ef4444;">
                <i class="fas fa-sign-out-alt"></i> Logout
            </a>
        </div>
    </aside>
    <!-- MAIN -->
    <div class="main-area">
        <!-- TOPBAR -->
        <header class="topbar">
            <div class="menu-toggle" onclick="document.querySelector('.sidebar').classList.toggle('show')">
                <i class="fas fa-bars"></i>
            </div>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search here...">
                <span class="search-hint">Ctrl + /</span>
            </div>
            <div class="topbar-right">
                <div class="kk-notice-wrap"><button type="button" class="icon-btn" onclick="toggleKkNotifications(event)" title="Notifications"><i class="fas fa-bell"></i><span id="kkNotificationBadge" class="badge-dot" th:if="${headerNotificationCount != null and headerNotificationCount > 0}" th:data-total="${headerNotificationCount}" th:text="${headerNotificationCount}">0</span></button><div id="kkNotificationBox" class="kk-notice-box"><div class="kk-notice-head"><span>Notifications</span><a href="/kk/notifications" style="color:#7c3aed;text-decoration:none">History</a></div><a class="kk-notice-item" th:each="notice:${headerNotifications}" th:href="${notice.link}"><i class="fas" th:classappend="${notice.type == 'donation' ? 'fa-wallet' : 'fa-bullhorn'}"></i><span><strong th:text="${notice.title}">Update</strong><small th:text="${notice.message}">Details</small></span></a><div class="kk-notice-empty" th:if="${headerNotifications == null or #lists.isEmpty(headerNotifications)}">No notifications.</div></div></div>
                <div class="icon-btn" onclick="window.location='/kk/campaigns'" title="Campaign alerts"><i class="fas fa-comment-dots"></i><span class="badge-dot" th:if="${headerMessageCount != null and headerMessageCount > 0}" th:text="${headerMessageCount}">0</span></div>
                <div class="user-pill">
                    <div class="user-avatar">
                        <span th:text="${donor?.fullName != null ? donor.fullName.substring(0,1).toUpperCase() : 'D'}">D</span>
                    </div>
                    <span th:text="${donor?.fullName ?: 'Donor'}">Donor</span>
                    <i class="fas fa-chevron-down"></i>
                </div>
            </div>
        </header>
        <!-- CONTENT -->
        <div class="content-scroll" th:replace="${content}">
            <!-- Page content gets injected here -->
        </div>
    </div>
</div>
<script>function refreshKkBadge(){const b=document.getElementById('kkNotificationBadge');if(!b)return;const total=Number(b.dataset.total||0),seen=Number(localStorage.getItem('kkNotificationsSeen')||0),unread=Math.max(0,total-seen);b.textContent=unread;b.style.display=unread?'flex':'none'}function toggleKkNotifications(e){e.stopPropagation();const box=document.getElementById('kkNotificationBox');box.classList.toggle('open');if(box.classList.contains('open')){const b=document.getElementById('kkNotificationBadge');localStorage.setItem('kkNotificationsSeen',b?b.dataset.total:'0');refreshKkBadge()}}document.addEventListener('click',()=>{const box=document.getElementById('kkNotificationBox');if(box)box.classList.remove('open')});refreshKkBadge();</script>
</body>
</html>
