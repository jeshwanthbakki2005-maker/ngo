<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:600px;margin:auto;background:#fff;border-radius:16px;overflow:hidden">

<tr><td style="padding:30px">
<p style="font-size:17px">Hello <strong th:text="${name}">Account Holder</strong>,</p>

<div style="margin:26px 0;padding:18px;text-align:center;background:#fff1f5;border:2px solid #f9a8c0;border-radius:12px;font-size:34px;font-weight:bold;letter-spacing:10px;color:#be185d" th:text="${otp}">123456</div>

</td></tr>
</table>
</td></tr>
