<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base :: layout(~{::title}, ~{::content})}">

<head><title th:fragment="title">Reset Password - NGO Fund Tracker</title></head>

<body><div th:fragment="content">
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card mt-5">
            <div class="card-header text-center">
                <h3><i class="fas fa-lock me-2"></i>Reset Password</h3>
            </div>
            <div class="card-body p-4">
                <p class="text-center text-muted mb-4">Enter your new password below.</p>

                <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

                <form method="POST" th:action="@{/complete-password-reset}" th:if="${invalidToken == null}">
                    <input type="hidden" name="token" th:value="${token}">
                    <div class="mb-3">
                        <label for="password" class="form-label"><i class="fas fa-lock me-2"></i>New Password</label>
                        <div class="password-input-wrap">
                            <input type="password" class="form-control" id="password" name="password" required
                                minlength="12" maxlength="72">
                            <button type="button" class="password-eye" onclick="toggleResetPassword('password', this)"
                                    aria-label="Show new password">
                                <i class="far fa-eye-slash"></i>
                            </button>
                        </div>
                        <div class="form-text">Use at least 12 characters with uppercase, lowercase, number, and special character.</div>
                    </div>

                    <div class="mb-4">
                        <label for="confirm_password" class="form-label"><i class="fas fa-lock me-2"></i>Confirm
                            Password</label>
                        <div class="password-input-wrap">
                            <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                                required minlength="12" maxlength="72">
                            <button type="button" class="password-eye" onclick="toggleResetPassword('confirm_password', this)"
                                    aria-label="Show confirm password">
                                <i class="far fa-eye-slash"></i>
                            </button>
                        </div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-2"></i>Reset Password
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<style>
.password-input-wrap{position:relative}
.password-input-wrap .form-control{padding-right:3.25rem}
.password-eye{position:absolute;right:.85rem;top:50%;transform:translateY(-50%);border:0;background:transparent;color:#34313a;font-size:1.15rem;padding:.4rem;cursor:pointer;z-index:2}
.password-eye:hover,.password-eye:focus{color:var(--pink-deep);outline:none}
</style>
<script>
function toggleResetPassword(fieldId, button) {
    const field = document.getElementById(fieldId);
    const icon = button.querySelector('i');
    const showing = field.type === 'text';
    field.type = showing ? 'password' : 'text';
    icon.className = showing ? 'far fa-eye-slash' : 'far fa-eye';
    button.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
}
</script>
</div></body></html>
