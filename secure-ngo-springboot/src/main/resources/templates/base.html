<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content)">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${title} ?: _">NGO Fund Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --pink-light: #FFF0F5;
            --pink-medium: #FFE4E1;
            --pink-accent: #FFB6C1;
            --pink-dark: #DB7093;
            --pink-deep: #C71585;
        }

        body {
            background: linear-gradient(135deg, var(--pink-light) 0%, var(--pink-medium) 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .navbar {
            background: linear-gradient(90deg, var(--pink-dark) 0%, var(--pink-deep) 100%) !important;
            box-shadow: 0 4px 15px rgba(199, 21, 133, 0.3);
        }

        .navbar-brand,
        .nav-link {
            color: white !important;
            font-weight: 600;
        }

        .nav-link:hover {
            color: var(--pink-light) !important;
            transform: scale(1.05);
            transition: all 0.3s ease;
        }

        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(219, 112, 147, 0.2);
            background: white;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(219, 112, 147, 0.3);
        }

        .card-header {
            background: linear-gradient(90deg, var(--pink-accent) 0%, var(--pink-dark) 100%);
            color: white;
            border-radius: 20px 20px 0 0 !important;
            font-weight: 600;
        }

        .btn-primary {
            background: linear-gradient(90deg, var(--pink-dark) 0%, var(--pink-deep) 100%);
            border: none;
            border-radius: 25px;
            padding: 10px 30px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(199, 21, 133, 0.4);
            background: linear-gradient(90deg, var(--pink-deep) 0%, var(--pink-dark) 100%);
        }

        .btn-success {
            background: linear-gradient(90deg, #28a745 0%, #20c997 100%);
            border: none;
            border-radius: 25px;
        }

        .btn-warning {
            background: linear-gradient(90deg, #ffc107 0%, #fd7e14 100%);
            border: none;
            border-radius: 25px;
            color: white;
        }

        .btn-danger {
            background: linear-gradient(90deg, #dc3545 0%, #c82333 100%);
            border: none;
            border-radius: 25px;
        }

        .form-control {
            border-radius: 15px;
            border: 2px solid var(--pink-accent);
            padding: 12px 20px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--pink-dark);
            box-shadow: 0 0 15px rgba(219, 112, 147, 0.3);
        }

        .form-select {
            border-radius: 15px;
            border: 2px solid var(--pink-accent);
            padding: 12px 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, white 0%, var(--pink-light) 100%);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            border-left: 5px solid var(--pink-dark);
        }

        .stat-icon {
            font-size: 3rem;
            color: var(--pink-dark);
            margin-bottom: 15px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--pink-deep);
        }

        .stat-label {
            color: #666;
            font-weight: 500;
        }

        .table {
            border-radius: 15px;
            overflow: hidden;
        }

        .table thead {
            background: linear-gradient(90deg, var(--pink-accent) 0%, var(--pink-dark) 100%);
            color: white;
        }

        .table tbody tr:hover {
            background-color: var(--pink-light);
        }

        .badge-verified {
            background: linear-gradient(90deg, #28a745 0%, #20c997 100%);
            padding: 8px 15px;
            border-radius: 20px;
        }

        .badge-pending {
            background: linear-gradient(90deg, #ffc107 0%, #fd7e14 100%);
            padding: 8px 15px;
            border-radius: 20px;
        }

        .badge-rejected {
            background: linear-gradient(90deg, #dc3545 0%, #c82333 100%);
            padding: 8px 15px;
            border-radius: 20px;
        }

        .progress {
            height: 25px;
            border-radius: 15px;
            background: var(--pink-light);
        }

        .progress-bar {
            background: linear-gradient(90deg, var(--pink-dark) 0%, var(--pink-deep) 100%);
            border-radius: 15px;
        }

        .sidebar {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(219, 112, 147, 0.2);
        }

        .sidebar-link {
            display: block;
            padding: 15px 20px;
            color: var(--pink-deep);
            text-decoration: none;
            border-radius: 15px;
            margin-bottom: 10px;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .sidebar-link:hover,
        .sidebar-link.active {
            background: linear-gradient(90deg, var(--pink-light) 0%, var(--pink-medium) 100%);
            color: var(--pink-deep);
            transform: translateX(10px);
        }

        .sidebar-link i {
            margin-right: 10px;
            width: 20px;
        }

        .hero-section {
            background: linear-gradient(135deg, var(--pink-dark) 0%, var(--pink-deep) 100%);
            color: white;
            border-radius: 30px;
            padding: 60px 40px;
            margin-bottom: 40px;
            text-align: center;
        }

        .feature-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--pink-light) 0%, var(--pink-medium) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .feature-icon i {
            font-size: 2rem;
            color: var(--pink-deep);
        }

        .alert {
            border-radius: 15px;
            border: none;
        }

        .alert-success {
            background: linear-gradient(90deg, #d4edda 0%, #c3e6cb 100%);
            color: #155724;
        }

        .alert-danger {
            background: linear-gradient(90deg, #f8d7da 0%, #f5c6cb 100%);
            color: #721c24;
        }

        .alert-warning {
            background: linear-gradient(90deg, #fff3cd 0%, #ffeeba 100%);
            color: #856404;
        }

        .floating-icon {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .pulse-icon {
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }
        }

        .rotate-icon {
            animation: rotate 4s linear infinite;
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        footer {
            background: linear-gradient(90deg, var(--pink-dark) 0%, var(--pink-deep) 100%);
            color: white;
            padding: 20px 0;
            margin-top: 50px;
        }
    </style>
</head>

<body>

    <!-- Top Navbar -->
    <nav class="navbar navbar-expand-lg py-3">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4" th:href="@{/}">
                <i class="fas fa-hand-holding-heart me-2 floating-icon"></i>NGO Fund Tracker
            </a>
            <div class="d-flex align-items-center gap-3 ms-auto">
                <span class="text-white fw-semibold">
                    <i class="fas fa-user-circle me-1"></i>
                    <span th:text="${name ?: ''}"></span>
                </span>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        
        <div th:if="${messages}" th:each="msg : ${messages}">
            <div class="alert alert-info alert-dismissible fade show" role="alert" th:classappend="'alert-' + ${msg.category}">
                <i class="fas fa-info-circle me-2"></i>
                <span th:text="${msg.text}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        </div>
        

        <div th:replace="${content} ?: _"></div>
    </div>

    <footer class="text-center">
        <div class="container">
            <p class="mb-0"><i class="fas fa-heart pulse-icon me-2"></i>NGO Fund Tracker - Transparent Donations,
                Verified Impact<i class="fas fa-heart pulse-icon ms-2"></i></p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <div th:replace="${scripts} ?: _"></div>
</body>

</html>
