<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base :: layout(~{::title}, ~{::content})}"><head><title th:fragment="title">Forgot Email - NGO Fund Tracker</title></head><body><div th:fragment="content"><div class="row justify-content-center"><div class="col-md-6 col-lg-5"><div class="card mt-5"><div class="card-header text-center"><h3><i class="fas fa-envelope-open-text me-2"></i>Forgot Email</h3></div><div class="card-body p-4"><p class="text-center text-muted mb-4">Enter your registered phone number to recover your account email.</p><div class="alert alert-success text-center" th:if="${maskedEmail}"><strong>Registered email:</strong><br><span th:text="${maskedEmail}" style="font-size:1.1rem"></span><div class="mt-2"><a href="/forgot-password">Continue to password reset</a></div></div><div class="alert alert-danger" th:if="${error}" th:text="${error}"></div><form method="post" action="/forgot-email"><div class="mb-4"><label class="form-label"><i class="fas fa-phone me-2"></i>Registered Phone Number</label><input class="form-control" name="phone" th:value="${enteredPhone}" placeholder="Enter your registered phone number" required></div><div class="d-grid"><button class="btn btn-primary" type="submit"><i class="fas fa-search me-2"></i>Find My Email</button></div></form><div class="text-center mt-3"><a href="/" class="text-decoration-none" style="color:var(--pink-deep);"><i class="fas fa-arrow-left me-1"></i>Back to Home</a></div></div></div></div></div></div></body></html>
