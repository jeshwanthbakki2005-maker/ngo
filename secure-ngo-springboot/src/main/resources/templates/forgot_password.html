<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base :: layout(~{::title}, ~{::content})}">

<head><title th:fragment="title">Forgot Password - NGO Fund Tracker</title></head>

<body><div th:fragment="content">
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card mt-5">
            <div class="card-header text-center">
                <h3><i class="fas fa-key me-2"></i>Forgot Password</h3>
            </div>
            <div class="card-body p-4">
                <p class="text-center text-muted mb-4" th:if="${otpEmail == null}">Enter your email address to receive a Gmail verification OTP.</p>
                <p class="text-center text-muted mb-4" th:if="${otpEmail != null}">Enter the six-digit OTP sent to <strong th:text="${otpEmail}">your email</strong>.</p>
                
                <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
                <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
                <form method="POST" th:action="@{/forgot-password}" th:if="${otpEmail == null}">

                    <div class="mb-4">
                        <label for="email" class="form-label"><i class="fas fa-envelope me-2"></i>Email Address</label>
                        <input type="email" class="form-control" id="email" name="email" required th:value="${enteredEmail}" placeholder="Enter your registered email">
                        <div class="text-end mt-2"><a th:href="@{/forgot-email}" class="text-decoration-none small" style="color:var(--pink-deep);"><i class="fas fa-search me-1"></i>Forgot your email?</a></div>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-paper-plane me-2"></i>Send OTP
                        </button>
                    </div>
                </form>
                <div th:if="${otpEmail != null}">
                    <form method="POST" th:action="@{/forgot-password/verify-otp}">
                        <input type="hidden" name="email" th:value="${otpEmail}">
                        <div class="mb-4">
                            <label for="otp" class="visually-hidden">Enter verification code</label>
                            <div class="otp-circles" id="otp-circles" aria-label="Enter six-digit OTP">
                                <input class="otp-circle" type="text" inputmode="numeric" maxlength="1" required autocomplete="one-time-code" aria-label="OTP digit 1">
                                <input class="otp-circle" type="text" inputmode="numeric" maxlength="1" required aria-label="OTP digit 2">
                                <input class="otp-circle" type="text" inputmode="numeric" maxlength="1" required aria-label="OTP digit 3">
                                <input class="otp-circle" type="text" inputmode="numeric" maxlength="1" required aria-label="OTP digit 4">
                                <input class="otp-circle" type="text" inputmode="numeric" maxlength="1" required aria-label="OTP digit 5">
                                <input class="otp-circle" type="text" inputmode="numeric" maxlength="1" required aria-label="OTP digit 6">
                            </div>
                            <input type="hidden" id="otp" name="otp" required>
                            <div class="form-text">The OTP expires in 10 minutes and allows five attempts.</div>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-circle-check me-2"></i>Verify OTP
                            </button>
                        </div>
                    </form>
                    <form method="POST" th:action="@{/forgot-password}" class="text-center mt-3">
                        <input type="hidden" name="email" th:value="${otpEmail}">
                        <button type="submit" class="btn btn-link text-decoration-none" style="color:var(--pink-deep);">
                            Resend OTP
                        </button>
                    </form>
                </div>

                <div class="text-center mt-3">
                    <a th:href="@{/}" class="text-decoration-none" style="color: var(--pink-deep);">
                        <i class="fas fa-arrow-left me-1"></i>Back to Home
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
<style>
.otp-circles{display:flex;justify-content:center;gap:12px;margin:10px 0 14px}
.otp-circle{width:56px;height:56px;border:2px solid #e36b99;border-radius:50%;background:#fff;text-align:center;font-size:1.45rem;font-weight:800;color:#34313a;outline:none;transition:border-color .2s,box-shadow .2s,transform .2s}
.otp-circle:focus{border-color:#cf1685;box-shadow:0 0 0 4px rgba(207,22,133,.13);transform:translateY(-2px)}
@media(max-width:480px){.otp-circles{gap:7px}.otp-circle{width:43px;height:43px;font-size:1.15rem}}
</style>
<script>
document.addEventListener('DOMContentLoaded', function () {
    const circles = Array.from(document.querySelectorAll('.otp-circle'));
    const hiddenOtp = document.getElementById('otp');
    if (!circles.length || !hiddenOtp) return;

    function syncOtp() {
        hiddenOtp.value = circles.map(circle => circle.value).join('');
    }

    circles.forEach((circle, index) => {
        circle.addEventListener('input', function () {
            circle.value = circle.value.replace(/D/g, '').slice(-1);
            syncOtp();
            if (circle.value && index < circles.length - 1) circles[index + 1].focus();
        });

        circle.addEventListener('keydown', function (event) {
            if (event.key === 'Backspace' && !circle.value && index > 0) {
                circles[index - 1].focus();
            }
            if (event.key === 'ArrowLeft' && index > 0) circles[index - 1].focus();
            if (event.key === 'ArrowRight' && index < circles.length - 1) circles[index + 1].focus();
        });

        circle.addEventListener('paste', function (event) {
            event.preventDefault();
            const digits = (event.clipboardData || window.clipboardData).getData('text')
                .replace(/D/g, '').slice(0, 6);
            digits.split('').forEach((digit, digitIndex) => {
                circles[digitIndex].value = digit;
            });
            syncOtp();
            circles[Math.min(digits.length, 6) - 1]?.focus();
        });
    });

    circles[0].focus();
});
</script>
</div></body></html>
