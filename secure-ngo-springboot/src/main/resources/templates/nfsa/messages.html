<!DOCTYPE html><html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{nfsa/nfsa_layout :: layout(~{::title}, ~{::content}, 'messages')}"><head><title>Messages - Admin Panel</title></head><body><div th:fragment="content"><style>.mp{max-width:950px;margin:20px auto}.mp h2{font-weight:800}.mp-sub{color:#64748b;margin-bottom:22px}.mp-grid{display:grid;gap:12px}.mp-item{background:#fff;border:1px solid #e2e8f0;border-radius:13px;padding:18px;display:flex;gap:14px;text-decoration:none;color:#0f172a}.mp-item:hover{border-color:#93c5fd;box-shadow:0 5px 16px rgba(37,99,235,.08)}.mp-avatar{width:44px;height:44px;border-radius:50%;background:#eff6ff;color:#2563eb;display:grid;place-items:center;flex:none}.mp-copy{flex:1}.mp-copy h4{font-size:.94rem;margin:0 0 5px}.mp-copy p{color:#64748b;font-size:.83rem;margin:0}.mp-copy small{display:block;color:#94a3b8;font-size:.7rem;margin-top:8px}.mp-empty{text-align:center;background:#fff;border:1px dashed #cbd5e1;border-radius:14px;padding:55px;color:#64748b}</style><main class="mp"><h2>Messages</h2><p class="mp-sub">Platform activity messages requiring administrator awareness.</p><section class="mp-grid"><a class="mp-item" th:each="m:${messages}" th:href="${m.link}"><span class="mp-avatar"><i class="far fa-envelope"></i></span><span class="mp-copy"><h4 th:text="${m.title}">Message</h4><p th:text="${m.message}">Message text</p><small th:text="${#temporals.format(m.date,'dd MMM yyyy, hh:mm a')}">Date</small></span><i class="fas fa-chevron-right" style="align-self:center;color:#cbd5e1"></i></a><div class="mp-empty" th:if="${messages == null or #lists.isEmpty(messages)}"><i class="far fa-envelope-open" style="font-size:3rem"></i><h3>No messages</h3></div></section></main></div></body></html>
