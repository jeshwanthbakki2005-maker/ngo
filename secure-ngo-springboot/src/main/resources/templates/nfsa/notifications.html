<!DOCTYPE html><html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{nfsa/nfsa_layout :: layout(~{::title}, ~{::content}, 'notifications')}"><head><title>Notifications - Admin Panel</title></head><body><div th:fragment="content"><style>.np{max-width:950px;margin:20px auto}.np h2{font-weight:800}.np-sub{color:#64748b;margin-bottom:22px}.np-card{background:#fff;border:1px solid #e2e8f0;border-radius:14px;overflow:hidden}.np-item{display:flex;gap:15px;padding:18px 20px;border-bottom:1px solid #f1f5f9;text-decoration:none;color:#0f172a}.np-item:hover{background:#f8fafc}.np-icon{width:42px;height:42px;border-radius:11px;background:#dbeafe;color:#2563eb;display:grid;place-items:center;flex:none}.np-copy{flex:1}.np-copy h4{font-size:.95rem;margin:0 0 5px}.np-copy p{font-size:.84rem;color:#64748b;margin:0 0 6px}.np-copy small{font-size:.72rem;color:#94a3b8}.np-empty{text-align:center;padding:55px;color:#64748b}</style><main class="np"><h2>Notifications</h2><p class="np-sub">All disaster reports, campaign updates, and donation activity.</p><section class="np-card"><a class="np-item" th:each="n:${notifications}" th:href="${n.link}"><span class="np-icon"><i class="fas" th:classappend="${n.type == 'donation' ? 'fa-coins' : 'fa-triangle-exclamation'}"></i></span><span class="np-copy"><h4 th:text="${n.title}">Notification</h4><p th:text="${n.message}">Message</p><small th:text="${#temporals.format(n.date,'dd MMM yyyy, hh:mm a')}">Date</small></span><i class="fas fa-chevron-right" style="align-self:center;color:#cbd5e1"></i></a><div class="np-empty" th:if="${notifications == null or #lists.isEmpty(notifications)}"><i class="far fa-bell" style="font-size:3rem"></i><h3>No notifications</h3></div></section></main></div></body></html>
