<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{nfsa/nfsa_layout :: layout(~{::title}, ~{::content}, 'settings')}">
<head><title>Settings - Admin Panel</title></head>
<body>
<div th:fragment="content">
    <div style="max-width:760px;margin:35px auto;padding:0 20px;">
        <h2 style="font-weight:800;color:#0f172a;margin-bottom:8px;">Settings</h2>
        <p style="color:#64748b;margin-bottom:24px;">Service connections used by the platform.</p>
        <div th:if="${successMessage}" th:text="${successMessage}" style="background:#dcfce7;color:#166534;border-radius:10px;padding:13px 16px;margin-bottom:16px;font-weight:600;"></div>
        <div th:if="${errorMessage}" th:text="${errorMessage}" style="background:#fee2e2;color:#991b1b;border-radius:10px;padding:13px 16px;margin-bottom:16px;font-weight:600;"></div>
        <section style="background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:24px;box-shadow:0 8px 24px rgba(15,23,42,.06);">
            <div style="display:flex;align-items:flex-start;gap:16px;">
                <div style="width:50px;height:50px;border-radius:12px;background:#fee2e2;color:#dc2626;display:grid;place-items:center;font-size:24px;">
                    <i class="fas fa-envelope"></i>
                </div>
                <div style="flex:1;">
                    <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;">
                        <h3 style="margin:0;color:#0f172a;">Gmail SMTP</h3>
                        <span id="gmailStatusBadge" th:text="${gmailStatus.label}"
                              th:style="${gmailStatus.connected} ? 'background:#dcfce7;color:#166534;padding:7px 12px;border-radius:999px;font-weight:700;font-size:.82rem' : 'background:#fee2e2;color:#991b1b;padding:7px 12px;border-radius:999px;font-weight:700;font-size:.82rem'">Not connected</span>
                    </div>
                    <p id="gmailStatusDetail" th:text="${gmailStatus.detail}" style="color:#64748b;margin:12px 0 16px;">Email delivery is disabled.</p>
                    <div style="background:#f8fafc;border-radius:10px;padding:13px 15px;color:#475569;">
                        <strong>Account:</strong> <span id="gmailAccount" th:text="${gmailAddress}">Not configured</span>
                    </div>
                    <div th:if="${!gmailStatus.connected}" style="margin-top:18px;text-align:right;">
                        <button type="button" id="toggleConfigButton" onclick="toggleGmailConfiguration()" style="border:1px solid #cbd5e1;background:#fff;color:#475569;border-radius:8px;padding:8px 13px;font-weight:700;cursor:pointer;"><i class="fas fa-eye-slash"></i> Hide configuration</button>
                    </div>
                    <form id="gmailConfigurationForm" th:if="${!gmailStatus.connected}" action="/nfsa/settings/gmail" method="post" style="margin-top:12px;display:grid;gap:14px;">
                        <div>
                            <label for="gmailUsername" style="display:block;font-weight:700;color:#334155;margin-bottom:7px;">Gmail address</label>
                            <input id="gmailUsername" name="gmailUsername" type="email" required
                                   th:value="${gmailAddress != 'Not configured' ? gmailAddress : ''}" placeholder="youraccount@gmail.com"
                                   style="width:100%;box-sizing:border-box;border:1px solid #cbd5e1;border-radius:9px;padding:12px 14px;font-size:1rem;">
                        </div>
                        <div>
                            <label for="gmailAppPassword" style="display:block;font-weight:700;color:#334155;margin-bottom:7px;">Google App Password</label>
                            <div style="display:flex;gap:8px;">
                            <input id="gmailAppPassword" name="gmailAppPassword" type="password" required autocomplete="new-password"
                                   placeholder="16-character App Password"
                                   style="flex:1;box-sizing:border-box;border:1px solid #cbd5e1;border-radius:9px;padding:12px 14px;font-size:1rem;">
                            <button id="togglePasswordButton" type="button" onclick="toggleGmailPassword()" style="border:1px solid #cbd5e1;background:#fff;color:#334155;border-radius:9px;padding:0 15px;font-weight:700;cursor:pointer;"><i class="fas fa-eye"></i> Show</button>
                            </div>
                            <small style="display:block;color:#64748b;margin-top:6px;">Use an App Password from your Google Account, not your normal Gmail password.</small>
                        </div>
                        <label style="display:flex;align-items:center;gap:9px;color:#334155;font-weight:600;">
                            <input type="checkbox" name="mailEnabled" value="true" checked style="width:18px;height:18px;"> Enable email notifications
                        </label>
                        <button type="submit" style="justify-self:start;border:0;border-radius:9px;background:#2563eb;color:white;padding:12px 20px;font-weight:700;cursor:pointer;">
                            <i class="fas fa-plug" style="margin-right:7px;"></i> Save &amp; Connect
                        </button>
                    </form>
                    <form th:if="${gmailStatus.connected}" action="/nfsa/settings/gmail" method="post" style="margin-top:18px;">
                        <input type="hidden" name="gmailUsername" th:value="${gmailAddress}">
                        <input type="hidden" name="mailEnabled" value="false">
                        <button type="submit" style="border:1px solid #fecaca;border-radius:9px;background:#fff;color:#b91c1c;padding:10px 16px;font-weight:700;cursor:pointer;">Disconnect Gmail</button>
                    </form>
                    <div th:if="${gmailStatus.connected}" style="margin-top:22px;padding-top:20px;border-top:1px solid #e2e8f0;">
                        <h4 style="margin:0 0 10px;color:#0f172a;">Send test email</h4>
                        <div style="display:flex;gap:10px;flex-wrap:wrap;">
                            <input id="testEmailRecipient" type="email" th:value="${gmailAddress}" placeholder="recipient@example.com"
                                   style="flex:1;min-width:240px;border:1px solid #cbd5e1;border-radius:9px;padding:11px 13px;font-size:.95rem;">
                            <button id="sendTestEmailButton" type="button" onclick="sendTestEmail()" style="border:0;border-radius:9px;background:#2563eb;color:#fff;padding:11px 18px;font-weight:700;cursor:pointer;">Send test</button>
                            <button type="button" onclick="refreshGmailStatus()" style="border:1px solid #cbd5e1;border-radius:9px;background:#fff;color:#334155;padding:11px 18px;font-weight:700;cursor:pointer;">Refresh status</button>
                        </div>
                        <div id="emailApiResult" role="status" style="display:none;margin-top:12px;border-radius:9px;padding:11px 13px;font-weight:600;"></div>
                    </div>
                </div>
            </div>
        </section>
    </div>
<script>
function showEmailResult(message, success) {
    const result = document.getElementById('emailApiResult');
    if (!result) return;
    result.textContent = message;
    result.style.display = 'block';
    result.style.background = success ? '#dcfce7' : '#fee2e2';
    result.style.color = success ? '#166534' : '#991b1b';
}
function toggleGmailPassword() {
    const input = document.getElementById('gmailAppPassword');
    const button = document.getElementById('togglePasswordButton');
    const hidden = input.type === 'password';
    input.type = hidden ? 'text' : 'password';
    button.innerHTML = hidden ? '<i class="fas fa-eye-slash"></i> Hide' : '<i class="fas fa-eye"></i> Show';
}
function toggleGmailConfiguration() {
    const form = document.getElementById('gmailConfigurationForm');
    const button = document.getElementById('toggleConfigButton');
    const hiding = form.style.display !== 'none';
    form.style.display = hiding ? 'none' : 'grid';
    button.innerHTML = hiding ? '<i class="fas fa-eye"></i> Show configuration' : '<i class="fas fa-eye-slash"></i> Hide configuration';
}
async function refreshGmailStatus() {
    try {
        const response = await fetch('/api/email/status', {headers:{'Accept':'application/json'}});
        if (!response.ok) throw new Error('Unable to fetch Gmail status.');
        const data = await response.json();
        const badge = document.getElementById('gmailStatusBadge');
        badge.textContent = data.label;
        badge.style.background = data.connected ? '#dcfce7' : '#fee2e2';
        badge.style.color = data.connected ? '#166534' : '#991b1b';
        document.getElementById('gmailStatusDetail').textContent = data.detail;
        document.getElementById('gmailAccount').textContent = data.account;
        showEmailResult('Gmail status updated.', data.connected);
    } catch (error) { showEmailResult(error.message, false); }
}
async function sendTestEmail() {
    const email = document.getElementById('testEmailRecipient').value.trim();
    const button = document.getElementById('sendTestEmailButton');
    if (!email) return showEmailResult('Enter a recipient email address.', false);
    button.disabled = true; button.textContent = 'Sending...';
    try {
        const response = await fetch('/api/email/test', {method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify({email})});
        const data = await response.json();
        showEmailResult(data.message || (response.ok ? 'Test email sent.' : 'Email failed.'), response.ok);
    } catch (error) { showEmailResult('Could not contact the email service.', false); }
    finally { button.disabled = false; button.textContent = 'Send test'; }
}
</script>
</div>
</body>
</html>
