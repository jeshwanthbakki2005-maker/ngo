# Server Configuration
server.port=${PORT:8080}
server.servlet.context-path=/
spring.application.name=secure-ngo-donation

# Profile (set to 'prod' for cloud deployment)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:prod}

# Thymeleaf caching (enable in production)
spring.thymeleaf.cache=true

# Database Configuration (H2 - file-based for cloud)
spring.datasource.url=jdbc:h2:file:/app/data/charity_guard;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# H2 Console (disable in production)
spring.h2.console.enabled=false

# JWT Configuration
jwt.secret=${JWT_SECRET:ngo-secure-key-2024-this-is-a-long-secret-key-for-jwt-token-generation}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS Configuration
spring.web.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Logging
logging.level.root=INFO
logging.level.com.ngo=DEBUG
logging.file.name=/app/logs/application.log
logging.file.max-size=10MB
logging.file.max-history=7

# Application description
app.name=Secure NGO Donation Tracking System
app.version=1.0.0
app.description=Comprehensive donation tracking system for NGOs with multi-user support

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.default-encoding=UTF-8
spring.mail.test-connection=false
app.mail.enabled=${MAIL_ENABLED:false}
app.mail.from=${MAIL_USERNAME:}
app.frontend-url=${APP_FRONTEND_URL:https://warned-mathematics-quarterly-designated.trycloudflare.com}